[package]
name = "cakru"
version = "0.1.0"
description = "Odfiz Tool ditenagai Rust"
authors = ["Odfiz"]
edition = "2021"

[lib]
name = "odfiz_app_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[dependencies]
tauri = { version = "2.0.0-rc", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"

[build-dependencies]
tauri-build = { version = "2.0.0-rc", features = [] }
