name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Build APK
        run: |
          npm install
          # Perintah ini akan mencoba membangun biner Rust
          # Karena ini struktur manual, kita panggil cargo langsung
          cd src-tauri
          cargo build --target aarch64-linux-android --release
