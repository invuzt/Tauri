name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # --- FITUR CACHE MULAI DI SINI ---
      - name: Cache Rust Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      # --- FITUR CACHE SELESAI ---

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Dependencies
        run: npm install

      - name: Build Android APK
        run: |
          # Jangan hapus gen jika ingin cache lebih maksimal, 
          # tapi tauri android init tetap butuh folder bersih kadang-kadang.
          npx tauri android init
          npx tauri android build --debug --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Find and Move APK
        run: |
          mkdir -p outputs
          find src-tauri/gen/android -name "*-debug.apk" -exec cp {} outputs/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: odfiz-tool-debug
          path: outputs/*.apk
