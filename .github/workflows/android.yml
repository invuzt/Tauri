name: Build Android APK (Auto-Fix)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Node Dependencies
        run: npm install

      - name: Build Android APK
        run: |
          # Logika pengecekan folder Java agar tidak error Identifier Mismatch
          if [ -d "src-tauri/gen/android" ]; then
            echo "Memeriksa integritas folder project..."
            if [ ! -d "src-tauri/gen/android/app/src/main/java/com/odfiz/tool" ]; then
              echo "Identifier tidak cocok dengan cache! Menghapus folder gen..."
              rm -rf src-tauri/gen
            fi
          fi

          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Inisialisasi ulang Android Project..."
            npx tauri android init
          fi

          # Tambahkan izin Storage otomatis
          MANIFES="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFES" ]; then
            echo "Menyuntikkan izin Storage..."
            sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>' $MANIFES
          fi

          npx tauri android build --debug --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Collect APK
        run: |
          mkdir -p outputs
          find src-tauri/gen/android -name "*-debug.apk" -exec cp {} outputs/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: odfiz-tool-final
          path: outputs/*.apk
