name: Build Android APK (Ultra Kecil)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}
          restore-keys: node-

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo registry & index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target/aarch64-linux-android/release
          key: rust-build-aarch64-${{ hashFiles('**/Cargo.lock', 'src-tauri/src/**') }}
          restore-keys: rust-build-aarch64-

      - name: Install Node dependencies
        run: npm install

      - name: Init Android project
        run: |
          if [ -d "src-tauri/gen/android" ]; then
            if [ ! -d "src-tauri/gen/android/app/src/main/java/com/odfiz/tool" ]; then
              echo "Identifier mismatch, reset gen folder..."
              rm -rf src-tauri/gen
            fi
          fi
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init
          fi

      - name: Inject Storage permissions
        run: |
          MANIFES="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFES" ]; then
            if ! grep -q "READ_EXTERNAL_STORAGE" "$MANIFES"; then
              sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>' "$MANIFES"
            fi
          fi

      - name: Build Release APK
        run: |
          npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          CARGO_PROFILE_RELEASE_STRIP: "true"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "z"
          CARGO_PROFILE_RELEASE_LTO: "true"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"

      - name: Collect APK
        run: |
          mkdir -p outputs
          find src-tauri/gen/android -name "*.apk" -exec cp {} outputs/ \;
          echo "=== APK Size ==="
          du -sh outputs/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: odfiz-tool-release
          path: outputs/*.apk
          retention-days: 7
