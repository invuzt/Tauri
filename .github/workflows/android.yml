name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Android APK (Debug Mode)
        # Menghapus --release agar otomatis ditandatangani dengan debug key
        run: |
          rm -rf src-tauri/gen
          npx tauri android init
          npx tauri android build --debug --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Find and Upload APK
        run: |
          mkdir -p outputs
          find src-tauri/gen/android -name "*-debug.apk" -exec cp {} outputs/ \;
          ls -R outputs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: odfiz-tool-debug
          path: outputs/*.apk
